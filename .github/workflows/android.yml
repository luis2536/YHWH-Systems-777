name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite ejecutar el botÃ³n manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del cÃ³digo
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Compilar APK
      # Ejecutamos Gradle directamente en caso de que no estÃ© el wrapper generado
      run: gradle assembleDebug 

    - name: Subir APK Generada
      uses: actions/upload-artifact@v4
      with:
        name: yhwh-systems-apk
        path: app/build/outputs/apk/debug/app-debug.apk
